services:
  postgres:
    image: postgres:16
    container_name: mini-drive-db
    restart: always
    environment:
      POSTGRES_USER: minidrive
      POSTGRES_PASSWORD: minidrive123
      POSTGRES_DB: minidrive_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: mini-drive-storage
    restart: always
    environment:
      MINIO_ROOT_USER: minidrive
      MINIO_ROOT_PASSWORD: minidrive123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  redis:
      image: redis:7
      container_name: mini-drive-cache
      restart: always
      ports:
        - "6379:6379"

volumes:
  pgdata:
  miniodata:

