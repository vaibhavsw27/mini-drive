
services:
  postgres:
    image: postgres:16
    container_name: mini-drive-db
    restart: always
    environment:
      POSTGRES_USER: minidrive
      POSTGRES_PASSWORD: minidrive123
      POSTGRES_DB: minidrive_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: